version: 2

project_name: arpmap

before:
  hooks:
    - go mod tidy

builds:
  - id: arpmap
    main: ./cmd
    binary: arpmap
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: linux-packages
    ids:
      - arpmap
    package_name: arpmap
    file_name_template: "{{ .ConventionalFileName }}"
    homepage: "https://github.com/marko-stanojevic/arpmap"
    maintainer: "Marko Stanojevic <marko-stanojevic@users.noreply.github.com>"
    description: "Cross-platform ARP-based host discovery CLI"
    vendor: "Marko Stanojevic"
    bindir: /usr/bin
    section: net
    priority: optional
    formats:
      - deb

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
